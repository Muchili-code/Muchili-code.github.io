site_name: Muchili's Blog
site_url: https://muchili-code.github.io/
use_directory_urls: false  # 禁用目录级 URL，使文件索引方式与 typora 一致
site_author: 慕迟离
site_description: Welcome To my site!

# 在页眉显示GitHub仓库链接
repo_url: https://github.com/Muchili-code/muchili-code.github.io # 博客仓库的实际URL
repo_name: Muchili/Blog # 自定义显示的仓库名称

theme:
  name: material
  custom_dir: overrides 
  language: zh 
  favicon: images/kuma.png

  palette: 
    - media: "(prefers-color-scheme: light)" 
      scheme: default # 主题配色方案
      primary: white # 主色调
      toggle: 
        icon: material/weather-night 
        name: 切换到深色模式                  

    - media: "(prefers-color-scheme: dark)"  
      scheme: slate                           
      primary: black
      toggle:
        icon: material/weather-sunny 
        name: 切换到浅色模式         

  features:
    - navigation.tracking   # 在url中使用标题定位锚点，即追踪当前页面位置，自动更新浏览器URL
    #- navigation.path      # 显示当前路径
    - navigation.prune     # 侧边栏自动折叠，会使得侧边栏只显示当前页面所属的章节及其直接子页面
    - navigation.tabs       # 启用顶级导航为标签页样式，注意顶级导航的概念
    #- navigation.tabs.sticky  #启用粘性选项卡后，导航选项卡将锁定在标题下方，并在向下滚动时始终保持可见
    - navigation.top        
    - navigation.footer     
    #- navigation.instant    
    #- navigation.sections  
    - navigation.expand     
    - navigation.indexes   #启用节索引页后，可以将文档直接附加到节

    - search.highlight      
    - search.suggest        

    - content.code.annotate # 代码行号
    - content.code.copy     
    - content.tabs          # 允许在 Markdown 中创建选项卡

    #- toc.follow            # toc 跟随
    #- toc.integrate
    - toggle.scheme         # 启用主题切换
  # toc: 
  #  depth: 4
  font:
    text: JetBrains Mono, LXGW WenKai Screen GB Screen
    code: JetBrains Mono, Consolas


copyright: Copyright &copy; 2025 Muchili/All Rights Reserved. 

extra:
  generator: false          # 删除页脚的“使用 MkDocs Material制造”
  social:
    - icon: fontawesome/brands/github 
      link: https://github.com/Muchili-code/Muchili-code.github.io
      title: 我的Github主页 
    - icon: fontawesome/brands/bilibili 
      link: https://space.bilibili.com/3493125026744857?spm_id_from=333.1387.0.0
    - icon: custom/cc98 
    # D:\Program Files (x86)\Python\python-3.12.10\Lib\site-packages\material\templates\.icons是默认的图标目录，容易出错；此外其寻找方式以自己为根目录
      link: https://www.cc98.org/ 
      title: CC98 论坛 
    - icon: fontawesome/solid/paper-plane 
      link: mailto:<2979568058@qq.com> 
      title: 联系我 
  repo:
    provider: github
    host: github.com
    user: Muchili     
    name: Blog        
  repo_stats: true    # 启用星标和 Fork 数量显示
  alternate:  # 翻译功能
    - name: 中文
      link: "#zh"   
      lang: zh
    - name: English
      link: "#en"   
      lang: en

extra_css:
