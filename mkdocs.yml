  - https://gcore.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css
  - https://gcore.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css
  - https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap
  - https://unpkg.com/katex@0/dist/katex.min.css  # katex样式
  - https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.css
  
extra_javascript:
  - javascripts/anchor.js
  #- javascripts/code.js
  - javascripts/custom.js
  - javascripts/extra.js
  - javascripts/katex.js 
  - javascripts/toc.js 
  - javascripts/typed_init.js
  #- javascripts/typed.js
  - https://cdn.jsdelivr.net/npm/typed.js@2.0.11
  - https://unpkg.com/katex@0/dist/katex.min.js # KaTeX 核心 JS
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js # auto-render 扩展
  - https://unpkg.com/mermaid@10.6.1/dist/mermaid.min.js

markdown_extensions:

  - abbr                  # 启用缩写功能。
  - attr_list             # 属性列表。允许你为 Markdown 元素（如标题、段落、图片等）添加 HTML 属性。
  - md_in_html            
  - meta                  
  - def_list              
  - footnotes             
  - tables                
  - toc:                  
      permalink: ⚓︎       # 标题的链接（锚点），图标是⚓︎
      title: 目录         
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}} # Unicode link
      toc_depth: 2-6

  - pymdownx.mark         
  - pymdownx.caret        # 插入文本标记。
  - pymdownx.tilde        # 删除线
  - pymdownx.arithmatex:  # LaTeX 数学公式支持。
      generic: true    
      smart_dollar: false 
      block_tag: 'div'    
  - pymdownx.escapeall 
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic       # 评论标记。支持插入、删除、替换等标记，常用于文档审阅
  - pymdownx.keys         # 键盘按键显示。允许你以美观的方式显示键盘按键。
  - pymdownx.tasklist:    
      custom_checkbox: true 

  - admonition            
  #- markdown_gfm_admonition 
  - pymdownx.details      
  - pymdownx.tabbed:      
      alternate_style: true 

  - pymdownx.highlight:   # 代码块高亮
      anchor_linenums: true # 当显示行号时，为每行代码生成一个锚点。
      linenums: true      # 代码块左侧行号
      #auto_title: true    # 自动在代码块上方显示编程语言的名称
  - pymdownx.inlinehilite # 行内代码高亮
  - pymdownx.snippets     # 其他文件作为“代码片段”嵌入到当前文件中。参见 https://facelessuser.github.io/pymdown-extensions/extensions/snippets/#snippets-notation
  - sane_lists  # 让列表解析逻辑更符合直觉
  - pymdownx.superfences:  # 增强型代码块
      preserve_tabs: false 
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  

plugins:
  - awesome-pages
  - callouts:
      aliases: false
  - changelog
  - glightbox
  #- macros
  - search
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai
      locale: zh
      enable_creation_date: true
      fallback_to_build_date: true
  - statistics:
      words_per_minute: 200
      codelines_per_minute: 80
      page_template: "assets/template.html"

